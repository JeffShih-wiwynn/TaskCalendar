name: calendar

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: calendar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: calendar
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calendar}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar -d calendar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: calendar-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://calendar:${POSTGRES_PASSWORD:-calendar}@postgres:5432/calendar
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/health >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: calendar-worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://calendar:${POSTGRES_PASSWORD:-calendar}@postgres:5432/calendar
    command: ["python", "-m", "app.google_calendar.worker"]

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: calendar-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8088}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
